<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #43cea2, #185a9d);
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 300px;
        text-align: center;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #185a9d;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      a {
        text-decoration: none;
        color: #185a9d;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Register</h2>

      <form>
        <input type="text" placeholder="Full Name" required />
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Password" required />
        <button type="submit">Register</button>
      </form>

      <p>Already have an account? <a href="loginpage.html">Login</a></p>
    </div>
  </body>
</html>
